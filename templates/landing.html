<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그릴마당</title>
  <meta name="description" content="그릴마당 동아리 사이트">
  <link rel="icon" href="/static/icon.png" type="image/png">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(-45deg, #eaf4fc, #fcfcfc, #fcf0e8, #f5f9ff);
      background-size: 400% 400%;
      animation: liquidGradient 15s ease infinite;
      color: #333;
    }

    @keyframes liquidGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      color: #000;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .header p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .site-card {
      text-decoration: none;
      display: flex;
      gap: 20px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      align-items: center;
    }

    .site-card:hover {
      border-color: #4f7dff;
      background: #fdfdfd;
      transform: translateY(-2px);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #f3f3f3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 1px solid #ddd;
    }

    .card-content {
      flex: 1;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 18px;
      color: #ccc;
    }

    .site-card:hover .card-arrow {
      color: #4f7dff;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      text-align: center;
      color: #888;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 28px;
      }

      .page {
        padding: 40px 15px;
      }

      .site-card {
        flex-direction: column;
        text-align: center;
      }
    }

    body {
      animation: slideDownEnter 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes slideDownEnter {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* ── Standing Character Images ── */
    /* ── Distributed Parallax Wrappers ── */
    .p-item {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .p-item img { pointer-events: auto; }

    .p-left-char { bottom: -80px; left: -3vw; z-index: 12; }
    .p-right-char { bottom: -80px; right: -3vw; z-index: 12; }

    @media (max-width: 1200px) {
      .p-left-char { left: -2vw; bottom: -120px; }
      .p-right-char { right: -2vw; bottom: -120px; }
    }
    @media (max-width: 800px) {
      .p-left-char, .p-right-char { display: none; }
    }

    /* ── Standing Character Images ── */
    .standing-char {
      height: 88vh;
      opacity: 0.95;
      cursor: pointer;
      mix-blend-mode: multiply;
      transition: opacity 0.3s ease;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
    }

    @media (max-width: 1200px) {
      .standing-char { height: 65vh; opacity: 0.6; }
    }

    /* 클릭 시 "뽈롱" 애니메이션 */
    .char-pop {
      animation: charPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
    }

    @keyframes charPop {
      0% { transform: scale(1); }
      30% { transform: scale(0.9, 1.1) translateY(-20px); }
      50% { transform: scale(1.05, 0.95); }
      100% { transform: scale(1); }
    }

    /* ── Floating Animations ── */
    .char-left {
      animation: floatLeft 6s ease-in-out infinite;
    }
    .char-right {
      animation: floatRight 6.5s ease-in-out infinite;
    }

    @keyframes floatLeft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes floatRight {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 클릭 파티클 이펙트 */
    .click-particle {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      animation: particleOut 0.6s ease-out forwards;
    }

    @keyframes particleOut {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ── Decorative Floating Items ── */
    .p-blue-1 { top: 12%; left: 18%; z-index: 1; }
    .p-blue-2 { bottom: 45%; left: 24%; z-index: 1; }
    .p-orange-1 { top: 14%; right: 18%; z-index: 1; }
    .p-orange-2 { bottom: 42%; right: 23%; z-index: 1; }

    .decor-item {
      pointer-events: none;
      opacity: 1;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
      mix-blend-mode: normal;
    }
    
    .decor-blue-1 { width: 90px; animation: floatDecorFlip 8s ease-in-out infinite; }
    .decor-blue-2 { width: 110px; animation: floatDecor 10s ease-in-out infinite reverse; }
    .decor-orange-1 { width: 80px; animation: floatDecor 9s ease-in-out infinite; }
    .decor-orange-2 { width: 100px; animation: floatDecorFlip 11s ease-in-out infinite reverse; }

    /* ── Parallax Wrapper 제거됨 (개별 처리로 변경) ── */

    @keyframes floatDecor {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(10px, -15px) rotate(2deg); }
      66% { transform: translate(-10px, 10px) rotate(-2deg); }
    }

    /* 좌우 반전된 요소들을 위한 별도 애니메이션 */
    @keyframes floatDecorFlip {
      0%, 100% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
      33% { transform: scaleX(-1) translate(-10px, -15px) rotate(-2deg); }
      66% { transform: scaleX(-1) translate(10px, 10px) rotate(2deg); }
    }

    /* ── Page Transition Exit ── */
    .slide-up-exit {
      transform: translateY(-30px) scale(0.98);
      opacity: 0 !important;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="page">
    <header class="header">
      <h1>그릴마당</h1>
      <p>동아리 부원들을 위한 웹 서비스입니다.<br>이용하실 서비스를 선택하세요.</p>
    </header>

    <div class="cards-grid">
      <!-- 마작 레이팅 시스템 -->
      <a href="/mahjong_rating" class="site-card">
        <div class="card-icon">🀄</div>
        <div class="card-content">
          <div class="card-title">마작 레이팅</div>
          <div class="card-desc">기록 관리, 랭킹, 실시간 레이팅 서비스를 제공합니다.</div>
        </div>
        <div class="card-arrow">↗</div>
      </a>

      <!-- 동아리 일정 관리 시스템 -->
      <a href="/schedule" class="site-card">
        <div class="card-icon">📅</div>
        <div class="card-content">
          <div class="card-title">동아리 일정</div>
          <div class="card-desc">동아리 일정을 확인하고 새로운 일정을 신청하세요.</div>
        </div>
        <div class="card-arrow">↗</div>
      </a>
    </div>

    <footer class="footer">
      <p>그릴마당 동아리 포털 &copy; 2025</p>
    </footer>
  </div>

  <!-- Distributed Parallax Items (각기 다른 Depth 가중치 부여) -->
  <div class="p-item p-left-char" data-depth="1.0">
    <img src="/static/left_char.png" class="standing-char" alt="좌측 캐릭터">
  </div>
  <div class="p-item p-right-char" data-depth="1.0">
    <img src="/static/right_char.png" class="standing-char" alt="우측 캐릭터">
  </div>

  <div class="p-item p-blue-1" data-depth="0.7">
    <img src="/static/blue_1.png" class="decor-item decor-blue-1" alt="장식">
  </div>
  <div class="p-item p-blue-2" data-depth="0.4">
    <img src="/static/blue_2.png" class="decor-item decor-blue-2" alt="장식">
  </div>
  <div class="p-item p-orange-1" data-depth="0.7">
    <img src="/static/orange_1.png" class="decor-item decor-orange-1" alt="장식">
  </div>
  <div class="p-item p-orange-2" data-depth="0.4">
    <img src="/static/orange_2.png" class="decor-item decor-orange-2" alt="장식">
  </div>

  <script>
    document.querySelectorAll('.site-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const target = this.getAttribute('href');
        if (target && target.startsWith('/')) {
          e.preventDefault();
          document.querySelector('.page').style.transition = 'transform 0.25s cubic-bezier(0.7, 0, 0.2, 1), opacity 0.2s ease';
          document.querySelector('.page').classList.add('slide-up-exit');
          
          document.querySelectorAll('.standing-char').forEach(char => {
            char.style.transition = 'transform 0.25s cubic-bezier(0.7, 0, 0.2, 1), opacity 0.2s ease';
            char.classList.add('slide-up-exit');
          });

          setTimeout(() => { window.location.href = target; }, 230);
        }
      });
    });

    // 캐릭터 클릭 인터랙션
    document.querySelectorAll('.standing-char').forEach(char => {
      char.addEventListener('click', function(e) {
        // 애니메이션 중복 방지 및 실행
        this.classList.remove('char-pop');
        void this.offsetWidth; // reflow
        this.classList.add('char-pop');

        // 파티클 생성
        const colors = this.classList.contains('char-left') 
          ? ['#add8e6', '#87ceeb', '#b0c4de', '#ffffff'] // 파랑 캐릭터용 파티클
          : ['#ffb347', '#ffcc33', '#ffe5b4', '#ffffff']; // 주황 캐릭터용 파티클

        for (let i = 0; i < 12; i++) {
          createParticle(e.clientX, e.clientY, colors);
        }
      });
    });

    function createParticle(x, y, colors) {
      const p = document.createElement('div');
      p.className = 'click-particle';
      
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.backgroundColor = color;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      
      // 랜덤 방향 및 거리
      const angle = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 100;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 600);
    }

    // 고도화된 Distributed Parallax 트래킹 로직
    const pItems = document.querySelectorAll('.p-item');
    
    document.addEventListener('mousemove', (e) => {
      const xRatio = (e.clientX / window.innerWidth - 0.5) * 2; // -1 to 1
      const yRatio = (e.clientY / window.innerHeight - 0.5) * 2; // -1 to 1
      
      // 화면 중앙에서의 거리에 비례한 비선형 가중치 (중앙에선 은은하게, 가장자리에선 확실하게)
      // Math.sign(xRatio) * Math.pow(Math.abs(xRatio), 0.8) 등으로 곡선 부여 가능
      const curvedX = Math.sign(xRatio) * Math.pow(Math.abs(xRatio), 0.8);
      const curvedY = Math.sign(yRatio) * Math.pow(Math.abs(yRatio), 0.8);
      
      pItems.forEach(item => {
        const depth = parseFloat(item.dataset.depth || 1.0);
        
        // 요소별 고유 Depth 가중치를 적용하여 개별적인 이동량 산출
        const moveX = curvedX * -12 * depth; // 캐릭터 기준 최대 12px
        const moveY = curvedY * -10 * depth; // 캐릭터 기준 최대 10px
        
        item.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });
    });
  </script>
</body>

</html>
