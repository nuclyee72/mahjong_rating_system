<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그릴마당</title>
  <meta name="description" content="그릴마당 동아리 사이트">
  <link rel="icon" href="/static/icon.png" type="image/png">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #fff;
      color: #333;
    }

    /* ── Layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      color: #000;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .header p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .site-card {
      text-decoration: none;
      display: flex;
      gap: 20px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      align-items: center;
    }

    .site-card:hover {
      border-color: #4f7dff;
      background: #fdfdfd;
      transform: translateY(-2px);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #f3f3f3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 1px solid #ddd;
    }

    .card-content {
      flex: 1;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 18px;
      color: #ccc;
    }

    .site-card:hover .card-arrow {
      color: #4f7dff;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      text-align: center;
      color: #888;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 28px;
      }

      .page {
        padding: 40px 15px;
      }

      .site-card {
        flex-direction: column;
        text-align: center;
      }
    }

    body {
      animation: slideDownEnter 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes slideDownEnter {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* ── Standing Character Images ── */
    .standing-char {
      position: fixed;
      bottom: -80px;
      height: 88vh;
      z-index: 1;
      opacity: 0.95;
      pointer-events: none;
      mix-blend-mode: multiply;
      transition: all 0.5s ease;
    }
    .char-left {
      left: -3vw;
      animation: floatLeft 6s ease-in-out infinite;
    }
    .char-right {
      right: -3vw;
      animation: floatRight 6.5s ease-in-out infinite;
    }

    @keyframes floatLeft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes floatRight {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 1200px) {
      .standing-char { height: 65vh; bottom: -120px; opacity: 0.6; }
      .char-left { left: -2vw; }
      .char-right { right: -2vw; }
    }
    @media (max-width: 800px) {
      .standing-char { display: none; }
    }

    /* ── Page Transition Exit ── */
    .slide-up-exit {
      transform: translateY(-30px) scale(0.98);
      opacity: 0 !important;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="page">
    <header class="header">
      <h1>그릴마당</h1>
      <p>동아리 부원들을 위한 웹 서비스입니다.<br>이용하실 서비스를 선택하세요.</p>
    </header>

    <div class="cards-grid">
      <!-- 마작 레이팅 시스템 -->
      <a href="/mahjong_rating" class="site-card">
        <div class="card-icon">🀄</div>
        <div class="card-content">
          <div class="card-title">마작 레이팅</div>
          <div class="card-desc">기록 관리, 랭킹, 실시간 레이팅 서비스를 제공합니다.</div>
        </div>
        <div class="card-arrow">↗</div>
      </a>

      <!-- 동아리 일정 관리 시스템 -->
      <a href="/schedule" class="site-card">
        <div class="card-icon">📅</div>
        <div class="card-content">
          <div class="card-title">동아리 일정</div>
          <div class="card-desc">동아리 일정을 확인하고 새로운 일정을 신청하세요.</div>
        </div>
        <div class="card-arrow">↗</div>
      </a>
    </div>

    <footer class="footer">
      <p>그릴마당 동아리 포털 &copy; 2025</p>
    </footer>
  </div>

  <img src="/static/left_char.png" class="standing-char char-left" alt="좌측 캐릭터">
  <img src="/static/right_char.png" class="standing-char char-right" alt="우측 캐릭터">

  <script>
    document.querySelectorAll('.site-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const target = this.getAttribute('href');
        if (target && target.startsWith('/')) {
          e.preventDefault();
          document.querySelector('.page').style.transition = 'transform 0.25s cubic-bezier(0.7, 0, 0.2, 1), opacity 0.2s ease';
          document.querySelector('.page').classList.add('slide-up-exit');
          
          document.querySelectorAll('.standing-char').forEach(char => {
            char.style.transition = 'transform 0.25s cubic-bezier(0.7, 0, 0.2, 1), opacity 0.2s ease';
            char.classList.add('slide-up-exit');
          });

          setTimeout(() => { window.location.href = target; }, 230);
        }
      });
    });
  </script>
</body>

</html>
