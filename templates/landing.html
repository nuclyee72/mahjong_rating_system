<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그릴마당 - 동아리 포털</title>
  <meta name="description" content="그릴마당 동아리 포털 사이트. 마작 레이팅 시스템을 포함한 동아리 전용 서비스를 이용하세요.">
  <link rel="icon" href="/static/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #0d0f1a;
      --bg-surface: #141728;
      --bg-card: #1a1e30;
      --bg-card-hover: #20253a;
      --accent-purple: #7c6fff;
      --accent-blue: #4fa3ff;
      --accent-cyan: #00d4ff;
      --accent-green: #00e5a0;
      --accent-gold: #ffd166;
      --text-primary: #f0f2ff;
      --text-secondary: #8892b0;
      --text-muted: #4a5068;
      --border: rgba(255,255,255,0.07);
      --glow-purple: rgba(124, 111, 255, 0.3);
      --glow-blue: rgba(79, 163, 255, 0.3);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,111,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,212,255,0.08) 0%, transparent 60%),
        var(--bg-dark);
    }

    .star-field {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease both;
    }

    .club-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(124,111,255,0.12);
      border: 1px solid rgba(124,111,255,0.3);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent-purple);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .club-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-purple);
      animation: pulse-dot 2s ease infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .header h1 {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent-purple) 50%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 400;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 360px));
      gap: 24px;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    /* ── Card ── */
    .site-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-color 0.3s,
                  box-shadow 0.3s;
      cursor: pointer;
      animation: fadeInUp 0.7s ease both;
    }

    .site-card:nth-child(1) { animation-delay: 0.1s; }
    .site-card:nth-child(2) { animation-delay: 0.2s; }
    .site-card:nth-child(3) { animation-delay: 0.3s; }

    .site-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: var(--card-glow, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .site-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--card-accent, var(--accent-purple));
      box-shadow: 0 20px 60px -10px var(--card-shadow, var(--glow-purple));
    }

    .site-card:hover::before {
      opacity: 1;
    }

    /* Mahjong card theme */
    .card-mahjong {
      --card-accent: var(--accent-purple);
      --card-shadow: rgba(124,111,255,0.4);
      --card-glow: radial-gradient(ellipse at top left, rgba(124,111,255,0.08) 0%, transparent 70%);
    }

    /* Schedule card theme */
    .card-schedule {
      --card-accent: var(--accent-blue);
      --card-shadow: rgba(79,163,255,0.4);
      --card-glow: radial-gradient(ellipse at top left, rgba(79,163,255,0.08) 0%, transparent 70%);
    }

    /* Coming soon card theme */
    .card-soon {
      --card-accent: var(--text-muted);
      --card-shadow: rgba(74,80,104,0.3);
      opacity: 0.6;
      cursor: default;
    }

    .card-soon:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--border);
    }

    /* Decorative glow orb */
    .card-orb {
      position: absolute;
      top: -40px;
      right: -40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--card-accent, var(--accent-purple));
      opacity: 0.06;
      filter: blur(30px);
      pointer-events: none;
    }

    /* Icon */
    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, rgba(124,111,255,0.2), rgba(0,212,255,0.1));
      border: 1px solid rgba(124,111,255,0.25);
      flex-shrink: 0;
    }

    .card-mahjong .card-icon {
      background: linear-gradient(135deg, rgba(124,111,255,0.25), rgba(79,163,255,0.15));
      border-color: rgba(124,111,255,0.3);
    }

    .card-schedule .card-icon {
      background: linear-gradient(135deg, rgba(79,163,255,0.25), rgba(0,212,255,0.15));
      border-color: rgba(79,163,255,0.3);
    }

    /* Content */
    .card-content {
      flex: 1;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Tags */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .tag-live {
      background: rgba(0,229,160,0.12);
      color: var(--accent-green);
      border: 1px solid rgba(0,229,160,0.25);
    }

    .tag-soon {
      background: rgba(74,80,104,0.3);
      color: var(--text-muted);
      border: 1px solid rgba(74,80,104,0.3);
    }

    /* Arrow */
    .card-arrow {
      align-self: flex-end;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(124,111,255,0.1);
      border: 1px solid rgba(124,111,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform 0.3s, background 0.3s;
      flex-shrink: 0;
    }

    .site-card:hover .card-arrow {
      transform: translate(3px, -3px);
      background: rgba(124,111,255,0.25);
    }

    .card-soon .card-arrow {
      opacity: 0.3;
    }

    /* ── Footer ── */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 60px;
      padding-bottom: 30px;
      animation: fadeInUp 1s ease 0.5s both;
    }

    .footer a {
      color: var(--accent-purple);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .footer a:hover { opacity: 1; }

    /* ── Animations ── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header { margin-bottom: 40px; }
      .cards-grid { gap: 16px; }
      .site-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="star-field" id="stars"></div>

  <div class="page">
    <header class="header">
      <div class="club-badge">동아리 포털</div>
      <h1>그릴마당</h1>
      <p>그릴마당 전용 서비스 포털입니다.<br>아래에서 이용하실 서비스를 선택해 주세요.</p>
    </header>

    <div class="cards-grid">

      <!-- 마작 레이팅 시스템 -->
      <a href="/mahjong_rating" class="site-card card-mahjong" id="card-mahjong">
        <div class="card-orb"></div>
        <div class="card-icon">🀄</div>
        <div class="card-content">
          <div class="card-title">마작 레이팅</div>
          <div class="card-desc">개인전·팀전 점수 기록, 랭킹, 통계, 뱃지 시스템을 한 곳에서 관리하세요.</div>
          <div class="card-tags">
            <span class="tag tag-live">● LIVE</span>
          </div>
        </div>
        <div class="card-arrow">↗</div>
      </a>

      <!-- 동아리 일정 관리 시스템 -->
      <a href="/schedule" class="site-card card-schedule" id="card-schedule">
        <div class="card-orb"></div>
        <div class="card-icon">📅</div>
        <div class="card-content">
          <div class="card-title">동아리 일정</div>
          <div class="card-desc">동아리 일정표를 확인하고, 관리자에게 새로운 일정을 요청할 수 있습니다.</div>
          <div class="card-tags">
            <span class="tag tag-live">● LIVE</span>
          </div>
        </div>
        <div class="card-arrow">↗</div>
      </a>

    </div>
  </div>

  <footer class="footer">
    <p>그릴마당 동아리 포털 &copy; 2025</p>
  </footer>

  <script>
    // Generate star field
    (function () {
      const field = document.getElementById('stars');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.8;
        s.style.cssText = `
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          width: ${size}px;
          height: ${size}px;
          --dur: ${(Math.random() * 3 + 2).toFixed(1)}s;
          --delay: ${(Math.random() * 4).toFixed(1)}s;
          opacity: ${(Math.random() * 0.5 + 0.1).toFixed(2)};
        `;
        field.appendChild(s);
      }
    })();
  </script>
</body>
</html>
