<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 관리 (관리자) - 그릴마당</title>
  <link rel="icon" href="/static/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #fff;
      color: #333;
    }
    
    /* ── Header ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #ddd;
      background: #f8f8f8;
      margin-bottom: 20px;
    }
    .top-bar h1 {
      font-size: 20px;
      font-weight: 700;
      color: #000;
    }
    .btn-link {
      display: inline-flex; align-items: center; justify-content: center;
      color: #666; text-decoration: none;
      font-size: 13px; font-weight: 500; transition: color 0.1s;
      padding: 4px 12px; border: 1px solid #ccc; background: #fff; border-radius: 16px;
      height: 28px;
    }
    .btn-link:hover { background: #eee; color: #000; }

    /* ── Main Layout ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 10px;
      display: flex; flex-direction: column; gap: 24px;
    }

    .section {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
    }
    .section h2 { margin-bottom: 12px; font-size: 16px; padding-bottom: 6px; border-bottom: 1px solid #eee; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
    th, td { padding: 8px; border: 1px solid #ddd; }
    th { background-color: #f3f3f3; color: #333; font-weight: 600; }
    
    .actions { display: flex; gap: 4px; justify-content: center; }
    button { padding: 4px 12px; border-radius: 16px; border: 1px solid #ccc; font-weight: 600; cursor: pointer; font-size: 12px; transition: background 0.1s; }
    
    .btn-approve { background: #e4ebff; color: #1f3bb8; border-color: #4f7dff; }
    .btn-approve:hover { background: #d0dcff; }
    
    .btn-delete { background: #fff; color: #cc0000; border-color: #cc0000; }
    .btn-delete:hover { background: #ffebeb; }

    .empty-state { text-align: center; color: #888; padding: 16px 0; font-size: 13px; }

    @media (max-width: 768px) {
      .top-bar { padding: 12px 15px; }
      th, td { font-size: 12px; padding: 6px 4px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>

  <div class="top-bar">
    <h1>그릴마당 일정</h1>
    <div class="actions">
      <a href="/schedule" class="btn-link">사용자 일정표 가기</a>
    </div>
  </div>

  <div class="container">
    
    <!-- 승인 대기 -->
    <div class="section">
      <h2>승인 대기 중인 신청</h2>
      <table>
        <thead>
          <tr>
            <th>신청자</th>
            <th>제목</th>
            <th>날짜</th>
            <th>시간</th>
            <th>장소</th>
            <th>설명</th>
            <th>승인/거절</th>
          </tr>
        </thead>
        <tbody id="pending-tbody">
          <tr><td colspan="6" class="empty-state">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 승인 완료 -->
    <div class="section">
      <h2>확정된 일정</h2>
      <table>
        <thead>
          <tr>
            <th>신청자</th>
            <th>제목</th>
            <th>날짜</th>
            <th>시간</th>
            <th>장소</th>
            <th>설명</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="confirmed-tbody">
          <tr><td colspan="6" class="empty-state">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="/static/script_schedule_admin.js?v=3"></script>
</body>
</html>
